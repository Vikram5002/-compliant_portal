<!-- Mobile Navigation Toggle Script -->
<!-- Include this script at the end of your body tag for mobile menu functionality -->

<script>
// Mobile Navigation Toggle Functionality
function initializeMobileMenu() {
    // Create hamburger button if on mobile
    const createHamburgerMenu = () => {
        const sidebar = document.querySelector('.sidebar');
        const mainContent = document.querySelector('.main-content');
        
        if (!sidebar) return; // Only works if sidebar exists
        
        // Create hamburger button
        const hamburger = document.createElement('button');
        hamburger.id = 'mobile-menu-toggle';
        hamburger.className = 'mobile-menu-toggle';
        hamburger.innerHTML = '<i class="fas fa-bars"></i>';
        hamburger.setAttribute('aria-label', 'Toggle navigation menu');
        
        // Insert before main content
        if (mainContent) {
            mainContent.parentNode.insertBefore(hamburger, mainContent);
        }
        
        // Toggle menu visibility
        hamburger.addEventListener('click', () => {
            sidebar.classList.toggle('mobile-open');
            hamburger.classList.toggle('active');
        });
        
        // Close menu when a link is clicked
        const navLinks = sidebar.querySelectorAll('.nav-item');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('mobile-open');
                hamburger.classList.remove('active');
            });
        });
        
        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !hamburger.contains(e.target)) {
                sidebar.classList.remove('mobile-open');
                hamburger.classList.remove('active');
            }
        });
    };
    
    // Initialize on page load and window resize
    createHamburgerMenu();
    window.addEventListener('resize', createHamburgerMenu);
}

// Initialize when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeMobileMenu);
} else {
    initializeMobileMenu();
}
</script>

<style>
/* Mobile Menu Toggle Styles */
.mobile-menu-toggle {
    display: none;
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 999;
    background: linear-gradient(135deg, #c41e3a 0%, #8B0000 100%);
    color: white;
    border: none;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 1.5em;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
    transition: all 0.3s ease;
}

.mobile-menu-toggle:hover {
    transform: scale(1.05);
}

.mobile-menu-toggle.active {
    background: linear-gradient(135deg, #8B0000 0%, #6B0000 100%);
    transform: rotate(90deg);
}

/* Mobile sidebar styles */
@media (max-width: 768px) {
    .mobile-menu-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 280px;
        height: 100vh;
        z-index: 998;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
    }
    
    .sidebar.mobile-open {
        transform: translateX(0);
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
    }
    
    .main-content {
        margin-left: 0;
        margin-top: 10px;
    }
}

@media (max-width: 480px) {
    .mobile-menu-toggle {
        width: 45px;
        height: 45px;
        font-size: 1.2em;
        top: 8px;
        left: 8px;
    }
    
    .sidebar {
        width: 250px;
    }
}
</style>
